<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>First Principles</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
<link rel="stylesheet" href="site.css" />

<script>
/* MathJax: physics package + the dhortcmds macro set, AMS numbering */
window.MathJax = {
  loader: { load: ['[tex]/physics'] },
  /* we typeset explicitly once the article is fetched; the automatic
     startup pass would register AMS \label twice and blank the equations */
  startup: { typeset: false },
  tex: {
    packages: { '[+]': ['physics'] },
    inlineMath: [['\\(', '\\)']],
    displayMath: [['\\[', '\\]']],
    processEnvironments: true,
    processEscapes: true,
    tags: 'ams',
    macros: {
      /* font/style shortcuts */
      ms: '\\mathscr', mc: '\\mathcal', mf: '\\mathfrak', mb: '\\mathbb',
      ds: '\\displaystyle', ol: '\\overline',
      /* blackboard sets */
      N: '\\mathbb{N}', R: '\\mathbb{R}', Rn: '\\mathbb{R}^n', Z: '\\mathbb{Z}',
      Q: '\\mathbb{Q}', F: '\\mathbb{F}', C: '\\mathbb{C}', E: '\\mathbb{E}',
      h: '\\mathcal{H}', rel: '\\mathcal{R}', lin: '\\mathcal{L}', K: '\\mathcal{K}',
      T: '\\mathcal{T}', U: '\\mathcal{U}', p: '\\mathcal{P}', B: '\\mathcal{B}',
      li: '\\mathcal{L}', Lie: '\\mathcal{L}',
      mathbbm: ['\\mathbb{#1}', 1],
      /* operators */
      re: '\\operatorname{Re}', im: '\\operatorname{Im}',
      spn: '\\operatorname{Span}', ran: '\\operatorname{Range}',
      rank: '\\operatorname{Rank}', nul: '\\operatorname{Null}',
      nulty: '\\operatorname{Nullity}', form: '\\operatorname{Form}',
      End: '\\operatorname{End}', gal: '\\operatorname{Gal}',
      GL: '\\operatorname{GL}', SL: '\\operatorname{SL}',
      ch: '\\operatorname{ch}', diam: '\\operatorname{diam}',
      /* linear algebra */
      mat: ['\\begin{bmatrix}#1\\end{bmatrix}', 1],
      smallmat: ['\\bigl[\\begin{smallmatrix}#1\\end{smallmatrix}\\bigr]', 1],
      bigbmatrix: ['\\begin{bmatrix}#1\\end{bmatrix}', 1],
      /* calculus */
      dif: ['\\frac{d^{#1}#2}{d#3^{#1}}', 3, ''],
      pd: ['\\frac{\\partial^{#1}#2}{\\partial#3^{#1}}', 3, ''],
      hess: '\\nabla^2',
      /* dirac / quantum */
      bk: ['\\left\\langle#1\\middle|#2\\right\\rangle', 2],
      kb: ['\\left|#1\\middle\\rangle\\middle\\langle#2\\right|', 2],
      com: ['\\left[#1,#2\\right]', 2],
      hb: '\\hbar', dg: '\\dagger', ot: '\\otimes',
      kpsi: '\\ket{\\psi}', kPsi: '\\ket{\\Psi}', kphi: '\\ket{\\phi}', kPhi: '\\ket{\\Phi}',
      /* analysis */
      sub: '\\subseteq', nsub: '\\nsubseteq',
      bl: ['B_{#1}', 1],
      cbr: ['\\left\\{#1\\right\\}', 1],
      lbr: ['\\left\\langle #1\\right\\rangle', 1],
      br: ['\\left(#1\\right)', 1],
      sbr: ['\\left[#1\\right]', 1],
      mcl: ['\\mathcal{#1}', 1],
      creq: ['\\underset{#1}{\\approx}', 1],
      seq: ['\\left(#1_{#2}\\right)_{#2=1}^{\\infty}', 2],
      Int: ['\\operatorname{Int}\\left(#1\\right)', 1],
      /* trig shortcuts */
      cs: ['\\cos\\left(#1\\right)', 1], sn: ['\\sin\\left(#1\\right)', 1],
      tn: ['\\tan\\left(#1\\right)', 1],
      css: ['\\cos^2\\left(#1\\right)', 1], snn: ['\\sin^2\\left(#1\\right)', 1],
      tnn: ['\\tan^2\\left(#1\\right)', 1],
      csh: ['\\cosh\\left(#1\\right)', 1], snh: ['\\sinh\\left(#1\\right)', 1],
      cshh: ['\\cosh^2\\left(#1\\right)', 1], snhh: ['\\sinh^2\\left(#1\\right)', 1],
      Lg: ['\\log\\left(#1\\right)', 1],
      /* relativity */
      gam: ['\\sqrt{1-\\frac{#1}{c^2}}', 1], pgam: ['\\sqrt{1+\\frac{#1}{c^2}}', 1],
      ring: ['\\mathring{#1}', 1],
      chris: ['\\Gamma^{#1}_{\\phantom{#1}#2#3}', 3],
      /* misc */
      emph: ['\\textit{#1}', 1],
      iso: '\\cong', w: '\\wedge', bigcdot: '\\bullet',
      md: ['{#1}\\big/{#2}', 2], nd: '\\nmid',
      highlight: ['\\bbox[#a7c4e680,4px]{#1}', 1],
      highlightone: ['\\bbox[#7fdb7f80,4px]{#1}', 1],
      highlighttwo: ['\\bbox[#b3bfb580,4px]{#1}', 1],
      highlightthree: ['\\bbox[#f8837880,4px]{#1}', 1],
      highlightlt: ['\\bbox[#1561bd33,4px]{#1}', 1]
    }
  },
  chtml: { scale: 0.96, matchFontHeight: true, mtextInheritFont: true },
  options: { enableMenu: false }
};
</script>
</head>
<body>
  <div class="page">
    <header class="top">
      <a class="mark" href="index.html">First Principles</a>
      <nav>
        <a href="index.html">Home</a>
        <a href="articles.html">Articles</a>
        <a href="about.html">About</a>
      </nav>
    </header>

    <main class="reader">
      <details class="sidebar" id="sidebar" open>
        <summary>Contents</summary>
        <div class="fold">
          <p class="allback"><a href="articles.html">&larr; all articles</a></p>
          <nav class="toc" id="toc" aria-label="Sections in this article"></nav>
        </div>
      </details>

      <article class="essay" id="essay">
        <p class="kicker" id="kicker" hidden></p>
        <h1 class="title" id="title"></h1>
        <svg class="ornament" width="72" height="14" viewBox="0 0 72 14" aria-hidden="true">
          <path d="M7 7 L13 1 L19 7 L13 13 Z M25 7 L31 1 L37 7 L31 13 Z M43 7 L49 1 L55 7 L49 13 Z"
                fill="none" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/>
          <circle cx="13" cy="7" r="1" fill="currentColor"/>
          <circle cx="31" cy="7" r="1" fill="currentColor"/>
          <circle cx="49" cy="7" r="1" fill="currentColor"/>
        </svg>
        <div id="body"></div>
        <img class="garden" id="garden" src="art/garden.png" alt="" hidden />
        <a class="backlink" href="articles.html">&larr; All articles</a>
      </article>
    </main>
  </div>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml-full.js" id="MathJax-script" async></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it@14.0.0/dist/markdown-it.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it-texmath@1.0.0/texmath.js"></script>
<script src="latex.js"></script>
<script>
(function () {
  const qs = new URLSearchParams(location.search);
  const slug = (qs.get('p') || '').replace(/[^a-zA-Z0-9_-]/g, '');
  const bodyEl = document.getElementById('body');
  const titleEl = document.getElementById('title');
  const kickerEl = document.getElementById('kicker');

  /* --- front matter for .md articles: leading --- block, key: value --- */
  function parseFrontMatter(text) {
    const meta = {};
    let body = text;
    const m = text.match(/^---\s*\n([\s\S]*?)\n---\s*\n?/);
    if (m) {
      body = text.slice(m[0].length);
      m[1].split('\n').forEach(line => {
        const i = line.indexOf(':');
        if (i > 0) {
          const k = line.slice(0, i).trim().toLowerCase();
          const v = line.slice(i + 1).trim();
          if (k) meta[k] = v;
        }
      });
    }
    return { meta, body };
  }

  function showError(msg) {
    titleEl.textContent = 'Not found';
    bodyEl.innerHTML = '';
    const p = document.createElement('p');
    p.textContent = msg;
    bodyEl.appendChild(p);
  }

  function setHead(meta) {
    const title = meta.title || slug || 'Untitled';
    titleEl.textContent = title;
    document.title = title + ' — First Principles';
    const bits = [];
    if (meta.topic) bits.push('<b></b>');
    if (meta.date) bits.push(meta.date);
    if (bits.length) {
      kickerEl.innerHTML = bits.join(' &nbsp;&middot;&nbsp; ');
      if (meta.topic) kickerEl.querySelector('b').textContent = meta.topic;
      kickerEl.hidden = false;
    }
  }

  /* --- markdown path (legacy articles) --- */
  function renderMarkdown(text, entry) {
    const { meta, body } = parseFrontMatter(text);
    setHead(Object.assign({}, entry, meta));
    const md = markdownit({ html: false, linkify: true, typographer: true });
    if (typeof texmath !== 'undefined' && typeof katex !== 'undefined') {
      md.use(texmath, { engine: katex, delimiters: 'dollars', katexOptions: { throwOnError: false } });
    }
    bodyEl.innerHTML = md.render(body);
    finishRender();
  }

  /* --- LaTeX path --- */
  function renderLatex(text, entry) {
    const { html, title } = LatexArticle.toHTML(text);
    setHead(Object.assign({ title: title || undefined }, entry));
    bodyEl.classList.add('latex');
    bodyEl.innerHTML = html;
    LatexArticle.inlineSVGs(bodyEl);
    const typeset = () => MathJax.typesetPromise([bodyEl]).then(() => {
      finishRender();
      /* if the URL carries a #hash to an equation/section, jump after typeset */
      if (location.hash) {
        const t = document.getElementById(decodeURIComponent(location.hash.slice(1)));
        if (t) t.scrollIntoView();
      }
    }).catch(err => {
      console.error('MathJax typeset failed:', err);
      finishRender();
    });
    (function waitForMathJax() {
      if (window.MathJax && MathJax.typesetPromise) typeset();
      else setTimeout(waitForMathJax, 80);
    })();
  }

  /* --- sidebar: the sections of THIS article --- */
  function buildTOC() {
    const tocEl = document.getElementById('toc');
    tocEl.textContent = '';
    const heads = bodyEl.querySelectorAll('h2, h3');
    if (!heads.length) return;
    const root = document.createElement('ul');
    let lastTop = null, subList = null;
    heads.forEach(h => {
      if (!h.id) {
        h.id = h.textContent.trim().toLowerCase()
          .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'sec';
      }
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = '#' + h.id;
      /* clone the heading's content (minus its number) so typeset math
         inside a title carries over to the sidebar */
      const copy = h.cloneNode(true);
      const num = copy.querySelector('.secnum');
      let numTxt = '';
      if (num) { numTxt = num.textContent; num.remove(); }
      if (numTxt) {
        const s = document.createElement('span');
        s.className = 'tocnum';
        s.textContent = numTxt;
        a.appendChild(s);
      }
      while (copy.firstChild) a.appendChild(copy.firstChild);
      li.appendChild(a);
      if (h.tagName === 'H3' && lastTop) {
        if (!subList) { subList = document.createElement('ul'); lastTop.appendChild(subList); }
        subList.appendChild(li);
      } else {
        root.appendChild(li);
        lastTop = li;
        subList = null;
      }
    });
    tocEl.appendChild(root);
  }

  /* light the entry for the section under the reader, and keep it in view
     inside the scrollable index */
  function setupScrollSpy() {
    const tocBox = document.getElementById('toc');
    const pairs = [...tocBox.querySelectorAll('a')]
      .map(a => [document.getElementById(a.getAttribute('href').slice(1)), a])
      .filter(p => p[0]);
    if (!pairs.length) return;
    let active = null, ticking = false;
    function update() {
      ticking = false;
      let cur = pairs[0][1];
      for (const [h, a] of pairs) {
        if (h.getBoundingClientRect().top <= 150) cur = a;
        else break;
      }
      if (cur === active) return;
      if (active) active.removeAttribute('aria-current');
      active = cur;
      active.setAttribute('aria-current', 'location');
      tocBox.scrollTop = active.offsetTop - tocBox.clientHeight / 2 + active.offsetHeight / 2;
    }
    window.addEventListener('scroll', () => {
      if (!ticking) { ticking = true; requestAnimationFrame(update); }
    }, { passive: true });
    update();
  }

  function finishRender() {
    buildTOC();
    setupScrollSpy();
    document.getElementById('garden').hidden = false;
  }

  /* sidebar folds on mobile, stays open on desktop */
  const sidebar = document.getElementById('sidebar');
  const mq = window.matchMedia('(min-width: 900px)');
  function syncFold() { sidebar.open = mq.matches; }
  if (mq.addEventListener) mq.addEventListener('change', syncFold);
  syncFold();

  if (!slug) {
    showError('No article was requested. Pick one from the index.');
    return;
  }

  /* --- load manifest, then the article it names --- */
  fetch('content/articles.json', { cache: 'no-store' })
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(list => {
      const articles = Array.isArray(list) ? list : [];
      const entry = articles.find(a =>
        (a.slug || (a.file || '').replace(/\.(md|tex)$/, '')) === slug) || {};
      /* unpublished articles are invisible unless this browser is in admin
         mode (see articles.html?admin=on) or has an admin preview override */
      const ovr = localStorage.getItem('fp-pub-' + slug);
      const published = ovr !== null ? ovr === '1' : entry.published !== false;
      if (!published && localStorage.getItem('fp-admin') !== '1') {
        showError('This article could not be found. It may have been moved or renamed.');
        return;
      }
      const file = entry.file || (slug + '.md');
      return fetch('content/' + file, { cache: 'no-store' })
        .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
        .then(text => {
          if (/\.tex$/.test(file)) renderLatex(text, entry);
          else renderMarkdown(text, entry);
        });
    })
    .catch(() => showError('This article could not be found. It may have been moved or renamed.'));
})();
</script>
</body>
</html>
