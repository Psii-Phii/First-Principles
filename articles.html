<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Articles — First Principles</title>
<meta name="description" content="Essays and lecture notes on physics and mathematics, written in LaTeX and built to be read slowly." />
<meta name="theme-color" content="#ece9e1" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Cpath d='M8 1.5 L14.5 8 L8 14.5 L1.5 8 Z' fill='none' stroke='%23732b2b' stroke-width='1.4'/%3E%3Ccircle cx='8' cy='8' r='1.4' fill='%23732b2b'/%3E%3C/svg%3E" />
<link rel="alternate" type="application/rss+xml" title="First Principles" href="feed.xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="site.css?v=4" />
<script src="site.js?v=4"></script>
</head>
<body>
  <div class="page">
    <header class="top">
      <a class="mark" href="index.html">First Principles</a>
      <nav>
        <a href="index.html">Home</a>
        <a href="articles.html" aria-current="page">Articles</a>
        <a href="about.html">About</a>
      </nav>
    </header>

    <main>
      <p class="eyebrow">The collection</p>
      <h1 class="pagetitle">Articles</h1>
      <p class="meta" id="count"></p>

      <svg class="ornament" width="72" height="14" viewBox="0 0 72 14" aria-hidden="true">
        <path d="M7 7 L13 1 L19 7 L13 13 Z M25 7 L31 1 L37 7 L31 13 Z M43 7 L49 1 L55 7 L49 13 Z"
              fill="none" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/>
        <circle cx="13" cy="7" r="1" fill="currentColor"/>
        <circle cx="31" cy="7" r="1" fill="currentColor"/>
        <circle cx="49" cy="7" r="1" fill="currentColor"/>
      </svg>

      <div class="searchrow">
        <input id="search" type="search" placeholder="search title, topic, or full text&hellip;"
               aria-label="Search articles" autocomplete="off" />
      </div>

      <div class="topics" id="topics" hidden>
        <span class="lbl">topics</span>
      </div>

      <ul class="articlelist" id="list"></ul>
      <p class="empty" id="empty" hidden>
        Nothing here yet. Add a LaTeX (or markdown) file to <code>content/</code>
        and one line to <code>content/articles.json</code> — see the README.
      </p>
    </main>
  </div>

  <img class="sideart" id="sideart" alt="" aria-hidden="true" hidden />

<script>
/* ---- side art: one of the ink pieces, chosen fresh on every load ---- */
(function () {
  const img = document.getElementById('sideart');
  img.src = FP.randomArt();
  img.hidden = false;
})();
</script>

<script>
(function () {
  if (FP.handleAdminParam()) { location.replace(location.pathname); return; }
  const ADMIN = FP.isAdmin();
  const slugOf = FP.slugOf, isPublished = FP.isPublished;

  const list = document.getElementById('list');
  const topicsRow = document.getElementById('topics');
  const countEl = document.getElementById('count');
  const emptyEl = document.getElementById('empty');
  const searchEl = document.getElementById('search');
  const emptyDefault = emptyEl.innerHTML;
  let articles = [], activeTopic = 'all';

  function visible() { return articles.filter(a => ADMIN || isPublished(a)); }

  const bodyText = {}; // slug -> lowercased plain text, once loaded

  function stripMarkup(raw) {
    return raw
      .replace(/\\[a-zA-Z]+\*?(\[[^\]]*\])?(\{[^}]*\})?/g, ' ')
      .replace(/[{}$#*_\[\]()`~^]/g, ' ')
      .replace(/\s+/g, ' ')
      .toLowerCase();
  }

  function loadBodies() {
    articles.forEach(a => {
      fetch('content/' + a.file, { cache: 'no-store' })
        .then(r => r.ok ? r.text() : '')
        .then(text => { bodyText[slugOf(a)] = stripMarkup(text); renderList(); })
        .catch(() => {});
    });
  }

  function matchesQuery(a, q) {
    if (!q) return true;
    const hay = [a.title, a.excerpt, a.topic, a.date, slugOf(a), bodyText[slugOf(a)] || '']
      .join(' ').toLowerCase();
    return q.split(/\s+/).filter(Boolean).every(term => hay.includes(term));
  }

  function renderList() {
    while (list.firstChild) list.removeChild(list.firstChild);
    const q = (searchEl.value || '').trim().toLowerCase();
    const pool = visible();
    const shown = pool
      .filter(a => activeTopic === 'all' || (a.topic || '') === activeTopic)
      .filter(a => matchesQuery(a, q));
    if (q) {
      const terms = q.split(/\s+/).filter(Boolean);
      const rank = a => {
        const t = (a.title || '').toLowerCase();
        if (terms.every(term => t.includes(term))) return 0;
        const e = ((a.excerpt || '') + ' ' + (a.topic || '')).toLowerCase();
        if (terms.every(term => e.includes(term))) return 1;
        return 2;
      };
      shown.sort((x, y) => rank(x) - rank(y));
    }
    shown.forEach(a => {
      const li = document.createElement('li');
      li.dataset.topic = a.topic || '';
      const pub = isPublished(a);
      if (!pub) li.style.opacity = '0.55';

      const when = document.createElement('p');
      when.className = 'when';
      when.innerHTML = (a.date || '') + ' &nbsp;&mdash;&nbsp; <b></b>';
      when.querySelector('b').textContent = a.topic || 'article';
      if (ADMIN) {
        const tag = document.createElement('b');
        tag.textContent = pub ? '' : ' · draft';
        when.appendChild(tag);
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'pubtoggle';
        btn.textContent = pub ? 'unpublish' : 'publish';
        btn.addEventListener('click', () => {
          FP.setPublished(slugOf(a), !pub);
          renderList();
        });
        when.appendChild(btn);
      }
      li.appendChild(when);

      const h2 = document.createElement('h2');
      const link = document.createElement('a');
      link.href = 'article.html?p=' + encodeURIComponent(slugOf(a));
      link.textContent = a.title || slugOf(a);
      h2.appendChild(link);
      li.appendChild(h2);

      if (a.excerpt) {
        const p = document.createElement('p');
        p.textContent = a.excerpt;
        li.appendChild(p);
      }
      list.appendChild(li);
    });
    emptyEl.hidden = shown.length > 0 || !!q;
    if (!shown.length && !q) emptyEl.innerHTML = emptyDefault;
    const total = pool.length;
    countEl.textContent = (q
      ? shown.length + ' matching “' + q + '”'
      : activeTopic === 'all'
        ? total + (total === 1 ? ' article' : ' articles')
        : shown.length + ' in ' + activeTopic)
      + (ADMIN ? ' · admin (toggles preview in this browser; set "published" in content/articles.json to change the live site)' : '');
  }

  searchEl.addEventListener('input', renderList);

  function buildTopics() {
    const topics = [...new Set(visible().map(a => a.topic).filter(Boolean))].sort();
    if (!topics.length) return;
    const mk = (name, val) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = name;
      b.setAttribute('aria-pressed', val === activeTopic ? 'true' : 'false');
      b.addEventListener('click', () => {
        activeTopic = val;
        topicsRow.querySelectorAll('button').forEach(x =>
          x.setAttribute('aria-pressed', x === b ? 'true' : 'false'));
        renderList();
      });
      topicsRow.appendChild(b);
    };
    mk('all', 'all');
    topics.forEach(t => mk(t, t));
    topicsRow.hidden = false;
  }

  fetch('content/articles.json', { cache: 'no-store' })
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(data => {
      articles = (Array.isArray(data) ? data : [])
        .slice()
        .sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      buildTopics();
      renderList();
      loadBodies();
    })
    .catch(() => {
      emptyEl.hidden = false;
      countEl.textContent = '';
    });
})();
</script>
</body>
</html>
