<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Articles — First Principles</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="site.css" />
</head>
<body>
  <div class="page">
    <header class="top">
      <a class="mark" href="index.html">First Principles</a>
      <nav>
        <a href="articles.html" aria-current="page">Articles</a>
        <a href="about.html">About</a>
      </nav>
    </header>

    <main>
      <p class="eyebrow">The collection</p>
      <h1 class="pagetitle">Articles</h1>
      <p class="meta" id="count"></p>

      <svg class="ornament" width="72" height="14" viewBox="0 0 72 14" aria-hidden="true">
        <path d="M7 7 L13 1 L19 7 L13 13 Z M25 7 L31 1 L37 7 L31 13 Z M43 7 L49 1 L55 7 L49 13 Z"
              fill="none" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/>
        <circle cx="13" cy="7" r="1" fill="currentColor"/>
        <circle cx="31" cy="7" r="1" fill="currentColor"/>
        <circle cx="49" cy="7" r="1" fill="currentColor"/>
      </svg>

      <div class="topics" id="topics" hidden>
        <span class="lbl">topics</span>
      </div>

      <ul class="articlelist" id="list"></ul>
      <p class="empty" id="empty" hidden>
        Nothing here yet. Add a LaTeX (or markdown) file to <code>content/</code>
        and one line to <code>content/articles.json</code> — see the README.
      </p>
    </main>
  </div>

  <canvas id="sideart" aria-hidden="true"></canvas>

<style>
  /* a quiet kolam tracing itself in the otherwise-empty right margin */
  #sideart {
    position: fixed;
    right: clamp(1rem, 4vw, 4rem);
    top: 50%;
    transform: translateY(-50%);
    width: min(30vw, 440px);
    height: min(30vw, 440px);
    z-index: -1;
    pointer-events: none;
    display: none;
  }
  @media (min-width: 1150px) { #sideart { display: block; } }
</style>

<script>
/* ---- side art: a sikku kolam drawing itself, then resting ---- */
(function () {
  const canvas = document.getElementById('sideart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const TAU = Math.PI * 2;

  /* diamond dot field: rows of 1,3,5,7,5,3,1 */
  function mask() {
    const n = 7, m = [];
    for (let r = 0; r < n; r++) {
      const row = [], width = n - 2 * Math.abs(r - (n - 1) / 2), start = (n - width) / 2;
      for (let c = 0; c < n; c++) row.push(c >= start && c < start + width);
      m.push(row);
    }
    return m;
  }

  /* mirror-curve tracer (same construction as the homepage kolams) */
  function trace(m) {
    const Rn = m.length, Cn = m[0].length;
    const ok = (r, c) => r >= 0 && r < Rn && c >= 0 && c < Cn && m[r][c];
    const wall = (x, y) => y % 2 === 0
      ? ok(y / 2 - 1, (x - 1) / 2) !== ok(y / 2, (x - 1) / 2)
      : ok((y - 1) / 2, x / 2 - 1) !== ok((y - 1) / 2, x / 2);
    const step = (x, y, dx, dy) => {
      const qx = x + dx, qy = y + dy;
      let ndx = dx, ndy = dy;
      if (qy % 2 === 0) { if (wall(qx, qy)) ndy = -dy; }
      else if (wall(qx, qy)) ndx = -dx;
      return [qx, qy, ndx, ndy];
    };
    const starts = [];
    for (let r = 0; r < Rn; r++) for (let c = 0; c < Cn; c++) {
      if (!m[r][c]) continue;
      starts.push([2 * c, 2 * r + 1, 1, -1], [2 * c, 2 * r + 1, 1, 1],
                  [2 * c + 1, 2 * r, 1, 1], [2 * c + 1, 2 * r, -1, 1],
                  [2 * c + 2, 2 * r + 1, -1, 1], [2 * c + 2, 2 * r + 1, -1, -1],
                  [2 * c + 1, 2 * r + 2, -1, -1], [2 * c + 1, 2 * r + 2, 1, -1]);
    }
    const seen = new Set(), key = (x, y, dx, dy) => x + ',' + y + ',' + dx + ',' + dy;
    const loops = [];
    for (const [sx, sy, sdx, sdy] of starts) {
      if (seen.has(key(sx, sy, sdx, sdy))) continue;
      const pts = [];
      let x = sx, y = sy, dx = sdx, dy = sdy;
      do {
        seen.add(key(x, y, dx, dy));
        pts.push([x, y]);
        seen.add(key(x + dx, y + dy, -dx, -dy));
        [x, y, dx, dy] = step(x, y, dx, dy);
      } while (!(x === sx && y === sy && dx === sdx && dy === sdy));
      if (pts.length > 2) loops.push(pts);
    }
    const dots = [];
    for (let r = 0; r < Rn; r++) for (let c = 0; c < Cn; c++)
      if (m[r][c]) dots.push([2 * c + 1, 2 * r + 1]);
    return { loops, dots, W: 2 * Cn, H: 2 * Rn };
  }

  let geo = null, total = 0, start = 0, raf = null;
  const DRAW_MS = 14000, HOLD_MS = 26000;

  function build() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const w = canvas.clientWidth, h = canvas.clientHeight;
    if (!w) { geo = null; return; }
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const t = trace(mask());
    const scale = Math.min(w, h) * 0.92 / Math.max(t.W, t.H);
    const ox = (w - t.W * scale) / 2, oy = (h - t.H * scale) / 2;
    const P = pt => [ox + pt[0] * scale, oy + pt[1] * scale];
    const mid = (a, b) => [(a[0] + b[0]) / 2, (a[1] + b[1]) / 2];
    geo = {
      dots: t.dots.map(P),
      loops: t.loops.map(raw => {
        const pts = raw.map(P), n = pts.length, out = [];
        let prev = mid(pts[0], pts[1]);
        out.push(prev);
        for (let i = 1; i <= n; i++) {
          const b = pts[i % n], m2 = mid(pts[i % n], pts[(i + 1) % n]);
          for (let s = 1; s <= 6; s++) {
            const u = s / 6, v = 1 - u;
            out.push([v * v * prev[0] + 2 * v * u * b[0] + u * u * m2[0],
                      v * v * prev[1] + 2 * v * u * b[1] + u * u * m2[1]]);
          }
          prev = m2;
        }
        return out;
      })
    };
    total = geo.loops.reduce((s, l) => s + l.length, 0);
  }

  function draw(progress) {
    const w = canvas.clientWidth, h = canvas.clientHeight;
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = 'rgba(138,133,123,0.55)';
    for (const [x, y] of geo.dots) {
      ctx.beginPath(); ctx.arc(x, y, 1.6, 0, TAU); ctx.fill();
    }
    let budget = Math.floor(progress * total);
    ctx.strokeStyle = 'rgba(115,43,43,0.4)';
    ctx.lineWidth = 1.3;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    for (const loop of geo.loops) {
      if (budget <= 0) break;
      const upto = Math.min(loop.length, budget);
      ctx.beginPath();
      ctx.moveTo(loop[0][0], loop[0][1]);
      for (let i = 1; i < upto; i++) ctx.lineTo(loop[i][0], loop[i][1]);
      if (upto === loop.length) ctx.closePath();
      ctx.stroke();
      budget -= loop.length;
    }
  }

  function frame(now) {
    if (!geo) { raf = null; return; }
    if (!start) start = now;
    const t = (now - start) % (DRAW_MS + HOLD_MS);
    draw(Math.min(1, t / DRAW_MS));
    raf = requestAnimationFrame(frame);
  }

  function boot() {
    build();
    if (!geo) return;           /* hidden on narrow screens */
    if (reduce) { draw(1); return; }
    start = 0;
    if (!raf) raf = requestAnimationFrame(frame);
  }

  window.addEventListener('resize', boot);
  boot();
})();
</script>

<script>
(function () {
  const list = document.getElementById('list');
  const topicsRow = document.getElementById('topics');
  const countEl = document.getElementById('count');
  const emptyEl = document.getElementById('empty');
  let articles = [], activeTopic = 'all';

  function slugOf(a) { return a.slug || (a.file || '').replace(/\.md$/, ''); }

  function renderList() {
    while (list.firstChild) list.removeChild(list.firstChild);
    const shown = articles.filter(a => activeTopic === 'all' || (a.topic || '') === activeTopic);
    shown.forEach(a => {
      const li = document.createElement('li');
      li.dataset.topic = a.topic || '';

      const when = document.createElement('p');
      when.className = 'when';
      when.innerHTML = (a.date || '') + ' &nbsp;&mdash;&nbsp; <b></b>';
      when.querySelector('b').textContent = a.topic || 'article';
      li.appendChild(when);

      const h2 = document.createElement('h2');
      const link = document.createElement('a');
      link.href = 'article.html?p=' + encodeURIComponent(slugOf(a));
      link.textContent = a.title || slugOf(a);
      h2.appendChild(link);
      li.appendChild(h2);

      if (a.excerpt) {
        const p = document.createElement('p');
        p.textContent = a.excerpt;
        li.appendChild(p);
      }
      list.appendChild(li);
    });
    emptyEl.hidden = shown.length > 0;
    countEl.textContent = activeTopic === 'all'
      ? articles.length + (articles.length === 1 ? ' article' : ' articles')
      : shown.length + ' in ' + activeTopic;
  }

  function buildTopics() {
    const topics = [...new Set(articles.map(a => a.topic).filter(Boolean))].sort();
    if (!topics.length) return;
    const mk = (name, val) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = name;
      b.setAttribute('aria-pressed', val === activeTopic ? 'true' : 'false');
      b.addEventListener('click', () => {
        activeTopic = val;
        topicsRow.querySelectorAll('button').forEach(x =>
          x.setAttribute('aria-pressed', x === b ? 'true' : 'false'));
        renderList();
      });
      topicsRow.appendChild(b);
    };
    mk('all', 'all');
    topics.forEach(t => mk(t, t));
    topicsRow.hidden = false;
  }

  fetch('content/articles.json', { cache: 'no-store' })
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(data => {
      articles = (Array.isArray(data) ? data : [])
        .slice()
        .sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      buildTopics();
      renderList();
    })
    .catch(() => {
      emptyEl.hidden = false;
      countEl.textContent = '';
    });
})();
</script>
</body>
</html>
